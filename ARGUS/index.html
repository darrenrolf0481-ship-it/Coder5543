<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARGUS — Neural Oversight Lab</title>
    <style>
      #argus-fatal {
        position: fixed; inset: 0; background: #0a0a0f; color: #f87171;
        font: 13px/1.5 monospace; padding: 24px; overflow: auto; z-index: 999999;
        display: none; white-space: pre-wrap;
      }
      #argus-boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #03070f; color: #38bdf8; font: 14px/1.5 monospace; letter-spacing: .3em;
        text-align: center; padding: 16px;
      }
    </style>
    <script>
      // Catch anything that blows up before/around React so the screen is never blank.
      window.__argusError = function (msg) {
        var el = document.getElementById('argus-fatal');
        var boot = document.getElementById('argus-boot');
        if (boot) boot.style.display = 'none';
        if (el) { el.style.display = 'block'; el.textContent = '⚠ ARGUS failed to load\n\n' + msg; }
      };
      window.addEventListener('error', function (e) {
        window.__argusError((e.error && e.error.stack) || e.message || String(e));
      });
      window.addEventListener('unhandledrejection', function (e) {
        window.__argusError('Unhandled promise rejection:\n' + ((e.reason && e.reason.stack) || e.reason));
      });
    </script>
  </head>
  <body>
    <div id="root">
      <div id="argus-boot">INITIALIZING ARGUS&hellip;</div>
    </div>
    <div id="argus-fatal"></div>
    <!-- Plain inline probe: proves basic (non-module) JS runs at all. -->
    <script>
      (function () {
        var b = document.getElementById('argus-boot');
        if (b) b.textContent = 'JS OK — loading modules…';
        // If the ES module never executes within 4s, say so explicitly.
        window.__argusModuleRan = false;
        setTimeout(function () {
          if (!window.__argusModuleRan && b && b.textContent.indexOf('JS OK') === 0) {
            b.textContent = 'MODULE BLOCKED — ES module did not run (sandbox/MIME).';
          }
        }, 4000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
