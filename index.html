
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crimson OS | AI Node</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ef4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Crimson OS">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/crimson-icon/192/192">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #110505;
            overscroll-behavior-y: contain;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="error-log" style="color: red; position: fixed; z-index: 9999; top: 0; left: 0; background: black;"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      window.addEventListener('error', (e) => {
        document.getElementById('error-log').innerText += e.message + '\\n';
        document.getElementById('error-log').style.width = '100vw';
        document.getElementById('error-log').style.height = '100vh';
      });
      window.addEventListener('unhandledrejection', (e) => {
        document.getElementById('error-log').innerText += e.reason + '\\n';
        document.getElementById('error-log').style.width = '100vw';
        document.getElementById('error-log').style.height = '100vh';
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
