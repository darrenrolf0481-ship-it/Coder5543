
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Crimson OS | AI Node</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ef4444">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Crimson OS">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/crimson-icon/192/192">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #110505;
            overscroll-behavior-y: contain;
        }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="error-log" style="color: #ff4444; position: fixed; z-index: 99999; top: 0; left: 0; background: #000; font-size: 13px; font-family: monospace; padding: 8px; white-space: pre-wrap; word-break: break-all;"></div>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
      window.addEventListener('error', (e) => {
        document.getElementById('error-log').innerText += e.message + '\\n';
        document.getElementById('error-log').style.width = '100vw';
        document.getElementById('error-log').style.height = '100vh';
      });
      window.addEventListener('unhandledrejection', (e) => {
        document.getElementById('error-log').innerText += e.reason + '\\n';
        document.getElementById('error-log').style.width = '100vw';
        document.getElementById('error-log').style.height = '100vh';
      });
    </script>
    <div id="splash" style="
      position:fixed;inset:0;background:#110505;display:flex;
      flex-direction:column;align-items:center;justify-content:center;gap:16px;
      font-family:system-ui,sans-serif;z-index:9990;
      transition:opacity 0.3s ease;
    ">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="18" stroke="#ef4444" stroke-width="2" opacity="0.3"/>
        <path d="M20 8 L24 16 L32 17 L26 23 L28 32 L20 27 L12 32 L14 23 L8 17 L16 16 Z"
              fill="#ef4444" opacity="0.9"/>
      </svg>
      <div style="color:#ef4444;font-size:11px;font-weight:900;letter-spacing:.3em;text-transform:uppercase;opacity:.7">
        Crimson OS
      </div>
      <div style="width:48px;height:2px;background:linear-gradient(90deg,transparent,#ef4444,transparent);
        animation:sl 1.4s ease-in-out infinite;">
      </div>
      <style>
        @keyframes sl{0%,100%{opacity:.2;transform:scaleX(.5)}50%{opacity:1;transform:scaleX(1)}}
      </style>
    </div>
    <div id="root"></div>
    <script>
      // Hard fallback: if React hasn't removed the splash in 4s, force-remove it
      setTimeout(function() {
        var s = document.getElementById('splash');
        if (s) { s.style.opacity = '0'; setTimeout(function(){ s.remove(); }, 300); }
      }, 4000);
    </script>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
