name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint
      - run: npm run check:stability

      # Dogfood: run projscan against itself. The CLI is freshly built above.
      # Threshold 90 because the false-positive ceiling we hit pre-1.1.1 is
      # gone, and we want CI to fail on any genuine regression.
      - name: Dogfood (projscan ci against the projscan repo)
        run: node dist/cli/index.js ci --min-score 90
