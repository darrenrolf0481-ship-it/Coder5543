name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to publish (e.g. v0.3.1)'
        required: true

concurrency:
  group: publish-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

jobs:
  verify-version:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.pick.outputs.ref }}
    steps:
      - id: pick
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "ref=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pick.outputs.ref }}
      - name: Ensure package.json version matches tag
        run: |
          pkg_version=$(node -p "require('./package.json').version")
          tag="${{ steps.pick.outputs.ref }}"
          expected="${tag#v}"
          if [ "$pkg_version" != "$expected" ]; then
            echo "::error::package.json version ($pkg_version) does not match tag ($expected)"
            exit 1
          fi

  test:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run lint

  publish:
    needs: [verify-version, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-version.outputs.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run build
      - name: Publish to npm (skip if version is already on the registry)
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "projscan@${version}" version > /dev/null 2>&1; then
            echo "projscan@${version} is already published - skipping (likely published locally before the GitHub release)."
            exit 0
          fi
          npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
